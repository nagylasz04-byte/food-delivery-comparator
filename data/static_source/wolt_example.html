<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolt Mock Webshop</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f3f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #0077ff;
      margin-bottom: 30px;
    }

    #data-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #eee;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin-top: 0;
      color: #333;
    }

    .price {
      color: #0077ff;
      font-weight: bold;
      font-size: 1.1em;
    }

    .hidden-costs {
      font-size: 0.9em;
      color: #555;
      margin-top: 10px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #777;
    }

    button {
      display: block;
      margin: 0 auto 30px auto;
      padding: 10px 20px;
      font-size: 16px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #005fce;
    }
  </style>
</head>
<body>
  <h1>🍕 Wolt Mock Webshop</h1>

  <button onclick="loadData()">🔄 Adatok frissítése</button>

  <div id="data-container">Betöltés...</div>

  <div class="footer">
    <p>Flask Mock API – Wolt példaprojekt</p>
  </div>

  <script>
    async function loadData() {
      const container = document.getElementById('data-container');
      container.innerHTML = "🔄 Adatok betöltése...";

      try {
        // Kérés a Flask API-hoz (ami a wolt_app.py-ben fut)
        const response = await fetch('http://127.0.0.1:5000/api/wolt/prices');
        const data = await response.json();

        container.innerHTML = "";

        // Minden ételhez kártyát készít
        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${item.food.image_url || 'https://via.placeholder.com/400x200?text=Wolt+Image'}" alt="${item.food.name}">
            <div class="card-content">
              <h3>${item.food.name}</h3>
              <p><strong>Webshop:</strong> ${item.webshop.name} (${item.webshop.address})</p>
              <p><strong>Kategória:</strong> ${item.food.category}</p>
              <p class="price">💰 Ár: ${item.webshop_food_info.price} Ft</p>
              <p><strong>Teljes ár:</strong> ${item.total_cost} Ft</p>
              <p>⏱️ Szállítás: ${item.webshop_food_info.delivery_time}</p>
              <div class="hidden-costs">
                <strong>Rejtett költségek:</strong>
                <ul>
                  ${item.hidden_costs.map(c => `<li>${c.type}: ${c.amount} Ft</li>`).join("")}
                </ul>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        container.innerHTML = "❌ Hiba történt az adatok betöltésekor.";
        console.error(error);
      }
    }

    // Oldal betöltésekor automatikusan lekéri az adatokat
    loadData();
  </script>
</body>
</html>
