{% extends "_base.html" %}
{% block content %}
<h1>{{ object.nev }}</h1>
<p>Cím: {{ object.cim }} | Platform: {{ object.get_platform_display }}</p>

{% if user.is_authenticated and user.is_staff %}
  <p>
    <a href="{% url 'catalog:etterem_update' object.pk %}">Szerkesztés</a> |
    <a href="{% url 'catalog:etterem_delete' object.pk %}">Törlés</a>
  </p>
{% endif %}
{% endblock %}
