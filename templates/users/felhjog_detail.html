{% extends "_base.html" %}
{% block content %}
<h1>Kapcsolat — {{ object }}</h1>
<p>Felhasználó: {{ object.felhasznalo }}</p>
<p>Jog: {{ object.jog }}</p>
{% if user.is_authenticated and user.is_staff %}
  <p><a href="{% url 'users:felhjog_update' object.pk %}">Szerkeszt</a> | <a href="{% url 'users:felhjog_delete' object.pk %}">Törlés</a></p>
{% endif %}
{% endblock %}
