version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: foodcompare
      POSTGRES_USER: foodcompare
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://foodcompare:password@db:5432/foodcompare
    depends_on:
      - db

volumes:
  postgres_data:
